name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          # Stop if there are syntax errors or undefined names
          flake8 vegan/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings only for style issues
          flake8 vegan/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Check package imports
        run: |
          python -c "import vegan; print('Package import OK')"
